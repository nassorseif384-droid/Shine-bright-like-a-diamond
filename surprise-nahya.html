<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surprise Nahya</title>
    <style>
        body {
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            padding: 40px;
            max-width: 700px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: #228b22;
            font-size: 2.5em;
        }
        .decor {
            font-size: 2.5em;
            margin: 20px 0;
        }
        .question {
            font-size: 1.3em;
            margin: 20px 0;
            color: #333;
        }
        .option {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            border-radius: 30px;
            background: #228b22;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .option:hover {
            transform: translateY(-20px);
        }
    </style>
</head>
<body>
    <div class="glass">
        <h1>?? Surprise Nahya ??</h1>
        <div class="decor">??????????</div>
        <div class="question">Nahya, do you admit you are the queen of jokes?</div>
        <div class="option">Yes ??</div>
        <div class="option">No ??</div>
        <div class="decor">??????</div>
    </div>
</body>
</html>
